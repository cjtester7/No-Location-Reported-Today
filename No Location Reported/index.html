<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>No Location Reported</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d0d14;
    --surface: #15151f;
    --surface2: #1c1c2a;
    --border: #2a2a3d;
    --accent: #f0a500;
    --accent2: #e05c2a;
    --text: #e8e8f0;
    --text-dim: #7a7a96;
    --text-muted: #454560;
    --green: #2ecf7a;
    --red: #e05c2a;
    --blue: #4a9eff;
    --radius: 10px;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .brand-icon {
    width: 34px;
    height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 13px;
    color: #000;
    letter-spacing: -0.5px;
  }

  .brand-text {
    line-height: 1.15;
  }

  .brand-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.3px;
  }

  .brand-sub {
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-icon {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-icon:active { background: var(--border); transform: scale(0.95); }
  .btn-icon.loading { opacity: 0.5; pointer-events: none; }

  .report-meta {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .badge {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .badge-date { background: rgba(240,165,0,0.12); color: var(--accent); border: 1px solid rgba(240,165,0,0.25); }
  .badge-count { background: rgba(46,207,122,0.1); color: var(--green); border: 1px solid rgba(46,207,122,0.2); }
  .badge-loc { background: rgba(74,158,255,0.1); color: var(--blue); border: 1px solid rgba(74,158,255,0.2); }

  /* ── Search ── */
  .search-bar {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    padding: 9px 12px 9px 36px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  .search-wrap {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 15px;
    pointer-events: none;
  }

  /* ── Main Content ── */
  .main {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 80px;
  }

  /* ── Vehicle Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .card.has-comment { border-color: rgba(240,165,0,0.35); }
  .card.expanded { border-color: var(--accent); }

  .card-header {
    padding: 12px 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .card-header:active { background: var(--surface2); }

  .stock-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .card-main {
    flex: 1;
    min-width: 0;
  }

  .vehicle-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 5px;
  }

  .vehicle-year {
    color: var(--accent);
    margin-right: 4px;
  }

  .card-tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tag-zone { background: rgba(74,158,255,0.1); color: var(--blue); }
  .tag-status { background: rgba(240,165,0,0.1); color: var(--accent); }
  .tag-days { background: rgba(224,92,42,0.12); color: var(--accent2); }
  .tag-days-ok { background: rgba(46,207,122,0.1); color: var(--green); }

  .card-chevron {
    color: var(--text-muted);
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 3px;
    transition: transform 0.2s;
  }

  .card.expanded .card-chevron { transform: rotate(180deg); }

  /* ── Card Detail (expanded) ── */
  .card-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    background: var(--bg);
  }

  .card.expanded .card-detail { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .detail-item {}

  .detail-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 2px;
  }

  .detail-value {
    font-size: 12px;
    color: var(--text);
    font-family: var(--font-mono);
    word-break: break-all;
  }

  .detail-item.full { grid-column: 1 / -1; }

  /* ── Comment Section ── */
  .comment-section {
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    background: var(--surface2);
  }

  .comment-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .comment-text {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 8px;
    min-height: 16px;
  }

  .comment-text.empty { color: var(--text-muted); font-style: italic; }

  .comment-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 13px;
    padding: 9px 11px;
    border-radius: 7px;
    outline: none;
    resize: none;
    min-height: 70px;
    line-height: 1.5;
    display: none;
    transition: border-color 0.15s;
  }

  .comment-textarea:focus { border-color: var(--accent); }

  .comment-actions {
    display: flex;
    gap: 7px;
    margin-top: 7px;
    display: none;
  }

  .btn {
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 7px;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.3px;
  }

  .btn:active { transform: scale(0.97); }

  .btn-save {
    background: var(--accent);
    color: #000;
    flex: 1;
  }

  .btn-save:disabled { opacity: 0.5; pointer-events: none; }

  .btn-cancel {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .btn-edit {
    font-size: 11px;
    padding: 5px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 5px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    font-family: var(--font-sans);
  }

  .btn-edit:active { background: var(--border); }

  .comment-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #000;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 8px;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--accent2); color: #fff; }

  /* ── Setup Screen ── */
  .setup-screen {
    display: none;
    padding: 32px 16px;
    text-align: center;
  }

  .setup-screen.visible { display: block; }

  .setup-icon { font-size: 48px; margin-bottom: 16px; }

  .setup-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .setup-desc {
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .setup-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 11px 12px;
    border-radius: 8px;
    outline: none;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }

  .setup-input:focus { border-color: var(--accent); }

  .btn-setup {
    width: 100%;
    background: var(--accent);
    color: #000;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 600;
    padding: 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.3px;
  }

  /* ── Empty / Loading ── */
  .state-msg {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }

  .state-msg .icon { font-size: 36px; margin-bottom: 12px; }
  .state-msg p { font-size: 13px; line-height: 1.6; }

  /* ── Config Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
    padding: 0;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    padding: 20px 16px 32px;
    width: 100%;
    animation: slideUp 0.25s ease-out;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .modal-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
    text-align: center;
  }

  .modal-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 5px;
    display: block;
  }

  .modal-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.15s;
  }

  .modal-input:focus { border-color: var(--accent); }

  .btn-modal-save {
    width: 100%;
    background: var(--accent);
    color: #000;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 600;
    padding: 12px;
    border-radius: 9px;
    border: none;
    cursor: pointer;
    margin-bottom: 8px;
  }

  .btn-modal-cancel {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-sans);
    font-size: 13px;
    padding: 11px;
    border-radius: 9px;
    cursor: pointer;
  }

  /* ── Spinning loader ── */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
  }

  .loading-state {
    text-align: center;
    padding: 48px 16px;
  }

  .loading-state .spinner {
    width: 28px;
    height: 28px;
    border-width: 3px;
    margin-bottom: 12px;
  }

  .loading-state p {
    color: var(--text-muted);
    font-size: 13px;
    font-family: var(--font-mono);
  }
</style>
</head>
<body>

<!-- Config Modal -->
<div class="modal-overlay" id="configModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Apps Script URL</div>
    <label class="modal-label">Web App URL</label>
    <input class="modal-input" id="urlInput" type="url" placeholder="https://script.google.com/macros/s/..." />
    <button class="btn-modal-save" onclick="saveConfig()">Save &amp; Refresh</button>
    <button class="btn-modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-icon">NLR</div>
      <div class="brand-text">
        <div class="brand-title">No Location Reported</div>
        <div class="brand-sub">CarMax · Location 4070</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="refreshBtn" onclick="loadData()" title="Refresh">↻</button>
      <button class="btn-icon" onclick="openModal()" title="Settings">⚙</button>
    </div>
  </div>
  <div class="report-meta" id="reportMeta" style="display:none;">
    <span class="badge badge-date" id="reportDate"></span>
    <span class="badge badge-count" id="vehicleCount"></span>
    <span class="badge badge-loc">Loc 4070</span>
  </div>
</div>

<!-- Search -->
<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">⊕</span>
    <input class="search-input" id="searchInput" type="text" placeholder="Search stock #, VIN, vehicle..." oninput="filterCards()" />
  </div>
</div>

<!-- Main -->
<div class="main" id="main">
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <p>Loading vehicles...</p>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = "nlr_script_url";
let allData = [];
let expandedStock = null;
let editingStock = null;

// ── Init ──────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  const url = localStorage.getItem(STORAGE_KEY);
  if (!url) {
    showSetup();
  } else {
    loadData();
  }
});

function showSetup() {
  document.getElementById("loadingState").innerHTML =
    '<div class="state-msg">' +
    '<div class="icon">⚙️</div>' +
    '<p>Tap the <strong>⚙</strong> button above to enter your<br>Apps Script Web App URL to get started.</p>' +
    '</div>';
}

// ── Data Loading ──────────────────────────────────────
async function loadData() {
  const url = localStorage.getItem(STORAGE_KEY);
  if (!url) { showSetup(); return; }

  document.getElementById("refreshBtn").classList.add("loading");
  document.getElementById("main").innerHTML =
    '<div class="loading-state"><div class="spinner"></div><p>Loading vehicles...</p></div>';
  document.getElementById("reportMeta").style.display = "none";

  try {
    const res = await fetch(url + "?action=read");
    const json = await res.json();

    if (json.status !== "ok") throw new Error(json.message || "Error");

    allData = json.data;
    renderCards(allData);
    updateMeta(allData);
  } catch (err) {
    document.getElementById("main").innerHTML =
      '<div class="state-msg"><div class="icon">⚠️</div>' +
      '<p>Could not load data.<br><small>' + err.message + '</small></p></div>';
  }

  document.getElementById("refreshBtn").classList.remove("loading");
}

// ── Render ────────────────────────────────────────────
function renderCards(data) {
  const main = document.getElementById("main");

  if (!data.length) {
    main.innerHTML = '<div class="state-msg"><div class="icon">✓</div><p>No vehicles to display.</p></div>';
    return;
  }

  main.innerHTML = data.map(row => buildCard(row)).join("");
}

function buildCard(row) {
  const stockNum = row["Stock Num"] || "";
  const year = row["Year"] || "";
  const desc = row["Vehicle Description"] || "";
  const scanDate = row["Last Scan Date"] || "";
  const scanLoc = row["Last Scan Location"] || "";
  const zone = row["Zone Description"] || "";
  const daysColor = row["Days in Color Zone"] || "0";
  const vin = row["VIN"] || "";
  const status = row["Product Status"] || "";
  const daysStatus = row["Days In Status"] || "";
  const comment = row["Comments"] || "";

  const isExpanded = expandedStock === stockNum;
  const hasComment = comment.trim() !== "";
  const daysNum = parseInt(daysColor) || 0;
  const daysTagClass = daysNum >= 3 ? "tag-days" : "tag-days-ok";

  return (
    '<div class="card' + (hasComment ? ' has-comment' : '') + (isExpanded ? ' expanded' : '') + '" id="card-' + stockNum + '">' +

    // Header (clickable)
    '<div class="card-header" onclick="toggleCard(\'' + stockNum + '\')">' +
    '<div class="stock-pill">#' + stockNum + '</div>' +
    '<div class="card-main">' +
    '<div class="vehicle-name"><span class="vehicle-year">' + year + '</span>' + desc + '</div>' +
    '<div class="card-tags">' +
    '<span class="tag tag-zone">' + (zone || scanLoc) + '</span>' +
    '<span class="tag tag-status">' + status + '</span>' +
    '<span class="tag ' + daysTagClass + '">' + daysColor + ' day' + (daysNum !== 1 ? 's' : '') + '</span>' +
    '</div>' +
    '</div>' +
    '<span class="card-chevron">▾</span>' +
    '</div>' +

    // Detail
    '<div class="card-detail">' +
    '<div class="detail-grid">' +
    '<div class="detail-item"><div class="detail-label">Last Scan Date</div><div class="detail-value">' + scanDate + '</div></div>' +
    '<div class="detail-item"><div class="detail-label">Scan Location</div><div class="detail-value">' + scanLoc + '</div></div>' +
    '<div class="detail-item"><div class="detail-label">Days In Status</div><div class="detail-value">' + daysStatus + '</div></div>' +
    '<div class="detail-item"><div class="detail-label">Color Zone Days</div><div class="detail-value">' + daysColor + '</div></div>' +
    '<div class="detail-item full"><div class="detail-label">VIN</div><div class="detail-value">' + vin + '</div></div>' +
    '</div>' +
    '</div>' +

    // Comment
    '<div class="comment-section">' +
    '<div class="detail-label">Comments</div>' +
    '<div class="comment-row">' +
    '<div class="comment-text' + (!hasComment ? ' empty' : '') + '" id="comment-text-' + stockNum + '">' +
    (hasComment ? comment : 'No comment yet') +
    '</div>' +
    '<button class="btn-edit" onclick="startEdit(\'' + stockNum + '\')">' + (hasComment ? 'Edit' : '+ Add') + '</button>' +
    '</div>' +
    '<textarea class="comment-textarea" id="comment-input-' + stockNum + '" placeholder="Add notes about this vehicle...">' + comment + '</textarea>' +
    '<div class="comment-actions" id="comment-actions-' + stockNum + '">' +
    '<button class="btn btn-cancel" onclick="cancelEdit(\'' + stockNum + '\')">Cancel</button>' +
    '<button class="btn btn-save" id="save-btn-' + stockNum + '" onclick="saveComment(\'' + stockNum + '\')">Save</button>' +
    '</div>' +
    '</div>' +

    '</div>'
  );
}

// ── Card Interactions ─────────────────────────────────
function toggleCard(stockNum) {
  if (expandedStock === stockNum) {
    expandedStock = null;
  } else {
    expandedStock = stockNum;
  }
  // Rebuild to reflect state
  filterCards();
}

function startEdit(stockNum) {
  event.stopPropagation();

  // Make sure card is expanded
  expandedStock = stockNum;
  filterCards();

  const textarea = document.getElementById("comment-input-" + stockNum);
  const actions = document.getElementById("comment-actions-" + stockNum);

  if (textarea) {
    textarea.style.display = "block";
    actions.style.display = "flex";
    textarea.focus();
    editingStock = stockNum;
  }
}

function cancelEdit(stockNum) {
  event.stopPropagation();
  const textarea = document.getElementById("comment-input-" + stockNum);
  const actions = document.getElementById("comment-actions-" + stockNum);

  // Restore original value
  const row = allData.find(r => String(r["Stock Num"]) === String(stockNum));
  if (textarea && row) textarea.value = row["Comments"] || "";
  if (textarea) textarea.style.display = "none";
  if (actions) actions.style.display = "none";
  editingStock = null;
}

async function saveComment(stockNum) {
  event.stopPropagation();
  const url = localStorage.getItem(STORAGE_KEY);
  if (!url) { toast("No URL configured", true); return; }

  const textarea = document.getElementById("comment-input-" + stockNum);
  const saveBtn = document.getElementById("save-btn-" + stockNum);
  const comment = textarea ? textarea.value.trim() : "";

  saveBtn.disabled = true;
  saveBtn.innerHTML = '<span class="spinner"></span>';

  try {
    await fetch(url + "?action=updateComment&stockNum=" + encodeURIComponent(stockNum) + "&comment=" + encodeURIComponent(comment), { mode: "no-cors" });

    // Update local data
    const row = allData.find(r => String(r["Stock Num"]) === String(stockNum));
    if (row) row["Comments"] = comment;

    toast(comment ? "Comment saved ✓" : "Comment cleared");
    editingStock = null;

    // Re-render
    filterCards();
    expandedStock = stockNum;
    filterCards();

  } catch (err) {
    toast("Save failed: " + err.message, true);
    saveBtn.disabled = false;
    saveBtn.innerHTML = "Save";
  }
}

// ── Search / Filter ───────────────────────────────────
function filterCards() {
  const q = (document.getElementById("searchInput").value || "").toLowerCase();
  const filtered = q
    ? allData.filter(r =>
        String(r["Stock Num"]).toLowerCase().includes(q) ||
        String(r["Vehicle Description"]).toLowerCase().includes(q) ||
        String(r["VIN"]).toLowerCase().includes(q) ||
        String(r["Zone Description"]).toLowerCase().includes(q) ||
        String(r["Product Status"]).toLowerCase().includes(q)
      )
    : allData;

  renderCards(filtered);
}

// ── Meta Bar ──────────────────────────────────────────
function updateMeta(data) {
  const meta = document.getElementById("reportMeta");
  meta.style.display = "flex";
  document.getElementById("reportDate").textContent = getTodayLabel();
  document.getElementById("vehicleCount").textContent = data.length + " vehicle" + (data.length !== 1 ? "s" : "");
}

function getTodayLabel() {
  const d = new Date();
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "2-digit" });
}

// ── Config Modal ──────────────────────────────────────
function openModal() {
  const url = localStorage.getItem(STORAGE_KEY) || "";
  document.getElementById("urlInput").value = url;
  document.getElementById("configModal").classList.add("open");
}

function closeModal() {
  document.getElementById("configModal").classList.remove("open");
}

function saveConfig() {
  const url = document.getElementById("urlInput").value.trim();
  if (!url) { toast("Please enter a URL", true); return; }
  localStorage.setItem(STORAGE_KEY, url);
  closeModal();
  loadData();
}

document.getElementById("configModal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

// ── Toast ─────────────────────────────────────────────
function toast(msg, isError) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show" + (isError ? " error" : "");
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => { el.className = "toast"; }, 2500);
}
</script>
</body>
