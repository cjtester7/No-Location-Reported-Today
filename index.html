<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>No Location Reported · v18</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

:root,[data-theme="dark"]{
  --bg:#0d0d14;--surface:#15151f;--surface2:#1c1c2a;--border:#2a2a3d;
  --accent:#f0a500;--accent2:#e05c2a;--text:#e8e8f0;--text-dim:#7a7a96;
  --text-muted:#454560;--green:#2ecf7a;--blue:#4a9eff;--shadow:rgba(0,0,0,.4);
  --tbl-hdr:#1c1c2a;--tbl-hover:#1a1a28;--tbl-alt:#131320;
}
[data-theme="light"]{
  --bg:#f4f4f8;--surface:#fff;--surface2:#ededf3;--border:#dcdce8;
  --accent:#c47f00;--accent2:#c0440f;--text:#1a1a2e;--text-dim:#555570;
  --text-muted:#aaaabc;--green:#1a9e57;--blue:#2270cc;--shadow:rgba(0,0,0,.07);
  --tbl-hdr:#ededf3;--tbl-hover:#f0f0f6;--tbl-alt:#f9f9fc;
}
*{box-sizing:border-box;margin:0;padding:0;
  --fm:'IBM Plex Mono',monospace;--fs:'IBM Plex Sans',sans-serif;}
body{background:var(--bg);color:var(--text);font-family:var(--fs);
     min-height:100vh;font-size:14px;transition:background .25s,color .25s;}

/* LOGIN */
.lw{display:none;min-height:100vh;align-items:center;justify-content:center;
    padding:24px 20px;background:var(--bg);}
.lw.show{display:flex;}
.lc{background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:32px 28px;width:100%;max-width:360px;box-shadow:0 8px 32px var(--shadow);}
.l-logo{width:56px;height:56px;background:var(--accent);border-radius:12px;
        display:flex;align-items:center;justify-content:center;
        font-family:var(--fm);font-weight:600;font-size:17px;color:#000;margin:0 auto 20px;}
.l-title{text-align:center;font-size:20px;font-weight:600;color:var(--text);margin-bottom:4px;}
.l-sub{text-align:center;font-size:12px;color:var(--text-dim);font-family:var(--fm);
       text-transform:uppercase;letter-spacing:1px;margin-bottom:28px;}
.l-lbl{display:block;font-family:var(--fm);font-size:11px;color:var(--text-muted);
       text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.l-inp{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
       font-family:var(--fs);font-size:17px;padding:13px 14px;border-radius:9px;
       outline:none;-webkit-appearance:none;transition:border-color .15s;}
.l-inp:focus{border-color:var(--accent);}
.l-field{margin-bottom:14px;}
.l-err{background:rgba(224,92,42,.12);border:1px solid rgba(224,92,42,.3);
       color:var(--accent2);border-radius:8px;padding:10px 13px;
       font-size:14px;margin-bottom:14px;display:none;text-align:center;}
.l-err.show{display:block;}
.l-btn{width:100%;background:var(--accent);color:#000;font-family:var(--fs);
       font-size:16px;font-weight:600;padding:14px;border-radius:9px;border:none;
       cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s;}
.l-btn:active{opacity:.85;}
.l-theme{display:flex;justify-content:center;margin-top:20px;gap:6px;
         align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);
     padding:13px 16px 11px;position:sticky;top:0;z-index:50;
     box-shadow:0 2px 8px var(--shadow);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}

/* Desktop: single row - rows render as flat flex children */
@media(min-width:640px){
  .hdr-row1{display:contents;}
  .hdr-row2{display:contents;}
  .btn-grid{display:contents;}
}
/* Mobile: brand+username top row, 2x2 button grid below */
@media(max-width:639px){
  .hdr-top{flex-direction:column;gap:8px;align-items:stretch;}
  .hdr-row1{display:flex;align-items:center;justify-content:space-between;width:100%;}
  .hdr-row2{display:flex;justify-content:flex-end;width:100%;}
  .btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .btn-grid .bi{width:100%;height:40px;font-size:17px;}
  .btn-grid .tt{width:100%;height:40px;background:var(--surface2);
                border:1px solid var(--border);border-radius:8px;
                justify-content:center;padding:0;}
}
.b-ico{width:34px;height:34px;background:var(--accent);border-radius:8px;
       display:flex;align-items:center;justify-content:center;
       font-family:var(--fm);font-weight:600;font-size:13px;color:#000;flex-shrink:0;}
.b-txt{line-height:1.15;}
.b-ttl{font-size:13px;font-weight:600;color:var(--text);}
.b-sub{font-size:10px;color:var(--text-dim);font-family:var(--fm);
       text-transform:uppercase;letter-spacing:1px;}
.hdr-act{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.u-lbl{font-family:var(--fm);font-size:11px;font-weight:600;color:var(--text-dim);
       background:var(--surface2);border:1px solid var(--border);border-radius:6px;
       padding:4px 10px;white-space:nowrap;text-transform:uppercase;}
.tt{display:flex;align-items:center;gap:5px;cursor:pointer;
    -webkit-tap-highlight-color:transparent;padding:3px;}
.tt-tr{width:36px;height:20px;background:var(--surface2);border:1px solid var(--border);
       border-radius:10px;position:relative;flex-shrink:0;}
.tt-kn{width:14px;height:14px;background:var(--accent);border-radius:50%;
       position:absolute;top:2px;left:2px;
       transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
[data-theme="light"] .tt-kn{transform:translateX(16px);}
.tt-ic{font-size:12px;line-height:1;user-select:none;}
.bi{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);
    width:34px;height:34px;border-radius:8px;cursor:pointer;display:flex;
    align-items:center;justify-content:center;font-size:15px;
    transition:all .15s;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.bi:active{background:var(--border);transform:scale(.95);}
.bi.loading{opacity:.5;pointer-events:none;}
.bi.active{background:var(--accent);border-color:var(--accent);color:#000;}
.rmt{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.bdg{font-family:var(--fm);font-size:10px;padding:3px 8px;border-radius:4px;
     letter-spacing:.5px;text-transform:uppercase;}
.bd{background:rgba(240,165,0,.12);color:var(--accent);border:1px solid rgba(240,165,0,.25);}
.bc{background:rgba(46,207,122,.1);color:var(--green);border:1px solid rgba(46,207,122,.2);}
.bl{background:rgba(74,158,255,.1);color:var(--blue);border:1px solid rgba(74,158,255,.2);}
.bv{background:rgba(240,165,0,.1);color:var(--accent);border:1px solid rgba(240,165,0,.2);font-size:9px;}

/* TOOLBAR */
.tb{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.sw{position:relative;}
.si{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
    font-family:var(--fs);font-size:16px;padding:10px 12px 10px 38px;
    border-radius:8px;outline:none;transition:border-color .15s;}
.si:focus{border-color:var(--accent);}
.si::placeholder{color:var(--text-muted);}
.sico{position:absolute;left:12px;top:50%;transform:translateY(-50%);
      color:var(--text-muted);font-size:15px;pointer-events:none;}
.sbar{display:none;gap:6px;flex-wrap:wrap;margin-top:8px;}
.sbar.show{display:flex;}
.spill{display:flex;align-items:center;gap:4px;font-family:var(--fm);font-size:10px;
       padding:5px 10px;border-radius:5px;border:1px solid var(--border);
       background:var(--surface2);color:var(--text-dim);cursor:pointer;
       -webkit-tap-highlight-color:transparent;transition:all .15s;
       white-space:nowrap;text-transform:uppercase;}
.spill:active{transform:scale(.96);}
.spill.asc{background:rgba(240,165,0,.12);border-color:rgba(240,165,0,.4);color:var(--accent);}
.spill.desc{background:rgba(74,158,255,.1);border-color:rgba(74,158,255,.3);color:var(--blue);}
.sarr{font-size:9px;}

/* MAIN */
.main{padding:12px 16px 80px;}

/* TAGS */
.tag{font-family:var(--fm);font-size:10px;padding:3px 7px;border-radius:3px;
     text-transform:uppercase;letter-spacing:.4px;}
.tz{background:rgba(74,158,255,.12);color:var(--blue);}
.ts{background:rgba(240,165,0,.12);color:var(--accent);}
.td{background:rgba(224,92,42,.14);color:var(--accent2);}
.tok{background:rgba(46,207,122,.12);color:var(--green);}
.tip{background:rgba(74,158,255,.14);color:var(--blue);border:1px solid rgba(74,158,255,.3);}
.tcp{background:rgba(46,207,122,.14);color:var(--green);border:1px solid rgba(46,207,122,.3);}
.tn{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}

/* CARD VIEW */
.cg{display:grid;grid-template-columns:1fr;gap:10px;}
@media(min-width:640px){.cg{grid-template-columns:1fr 1fr;}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
      box-shadow:0 1px 4px var(--shadow);transition:border-color .15s;}
.card.hn{border-color:rgba(240,165,0,.4);}
.card.open{border-color:var(--accent);}
.ch{padding:13px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;
    display:flex;gap:12px;align-items:flex-start;transition:background .15s;border-radius:10px;}
.card.open .ch{border-radius:10px 10px 0 0;}
.ch:active{background:var(--surface2);}
.sp{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
    padding:4px 9px;font-family:var(--fm);font-size:12px;color:var(--accent);
    white-space:nowrap;flex-shrink:0;margin-top:2px;}
.cb{flex:1;min-width:0;}
.vn{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:6px;}
.vy{color:var(--accent);margin-right:4px;}
.ct{display:flex;gap:5px;flex-wrap:wrap;}
.cc{color:var(--text-muted);font-size:12px;flex-shrink:0;margin-top:3px;transition:transform .2s;}
.card.open .cc{transform:rotate(180deg);}
.cd{display:none;border-top:1px solid var(--border);padding:13px 14px;
    background:var(--bg);border-radius:0 0 10px 10px;}
.card.open .cd{display:block;}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.di.full{grid-column:1/-1;}
.dl{font-family:var(--fm);font-size:10px;color:var(--text-muted);
    text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;}
.dv{font-size:13px;color:var(--text);font-family:var(--fm);word-break:break-all;}

/* MOBILE LIST */
.ml{display:flex;flex-direction:column;gap:1px;background:var(--border);
    border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.mr{background:var(--surface);padding:14px 16px;cursor:pointer;
    -webkit-tap-highlight-color:transparent;transition:background .1s;
    display:flex;align-items:center;gap:12px;}
.mr:active{background:var(--surface2);}
.mr.hn{border-left:3px solid var(--accent);}
.mrl{flex:1;min-width:0;}
.mrs{font-family:var(--fm);font-size:13px;font-weight:600;color:var(--accent);margin-bottom:4px;}
.mrv{font-size:16px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:6px;}
.mry{color:var(--accent);margin-right:4px;}
.mrm{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.mrr{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.mtb{font-family:var(--fm);font-size:11px;font-weight:600;padding:4px 10px;
     border-radius:5px;text-transform:uppercase;white-space:nowrap;}
.mtb.ip{background:rgba(74,158,255,.14);color:var(--blue);border:1px solid rgba(74,158,255,.3);}
.mtb.cp{background:rgba(46,207,122,.14);color:var(--green);border:1px solid rgba(46,207,122,.3);}
.mch{color:var(--text-muted);font-size:18px;}

/* FULL-SCREEN DETAIL */
.ds{display:none;position:fixed;inset:0;z-index:200;
    background:var(--bg);flex-direction:column;overflow:hidden;}
.ds.show{display:flex;}
.dsh{background:var(--surface);border-bottom:1px solid var(--border);
     padding:13px 16px;display:flex;align-items:center;gap:12px;
     flex-shrink:0;box-shadow:0 2px 8px var(--shadow);}
.dsbk{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);
      height:38px;padding:0 16px;border-radius:8px;cursor:pointer;
      display:flex;align-items:center;gap:6px;font-family:var(--fs);
      font-size:14px;font-weight:600;-webkit-tap-highlight-color:transparent;
      transition:all .15s;flex-shrink:0;white-space:nowrap;}
.dsbk:active{background:var(--border);transform:scale(.97);}
.dshi{flex:1;min-width:0;}
.dshs{font-family:var(--fm);font-size:12px;color:var(--accent);font-weight:600;margin-bottom:2px;}
.dshv{font-size:15px;font-weight:600;color:var(--text);line-height:1.2;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;}
.dsec{background:var(--surface);border:1px solid var(--border);
      border-radius:12px;padding:16px;margin-bottom:12px;}
.dsec-t{font-family:var(--fm);font-size:10px;color:var(--text-muted);
        text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;}
.dff{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.df{} .df.full{grid-column:1/-1;}
.dfl{font-family:var(--fm);font-size:11px;color:var(--text-muted);
     text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;}
.dfv{font-size:16px;color:var(--text);font-family:var(--fm);
     word-break:break-all;line-height:1.3;}
.dsb{width:100%;padding:13px 14px;border-radius:9px;font-family:var(--fs);
     font-size:16px;font-weight:600;cursor:pointer;border:1px solid var(--border);
     background:var(--surface2);color:var(--text-dim);transition:all .2s;
     -webkit-tap-highlight-color:transparent;display:flex;align-items:center;
     justify-content:center;gap:8px;}
.dsb:active{transform:scale(.98);}
.dsb.ip{background:rgba(74,158,255,.14);border-color:rgba(74,158,255,.45);color:var(--blue);}
.dsb.cp{background:rgba(46,207,122,.14);border-color:rgba(46,207,122,.45);color:var(--green);}
.dsb.saving{opacity:.6;pointer-events:none;}
.dct{font-size:16px;color:var(--text);line-height:1.6;margin-bottom:8px;min-height:20px;}
.dct.empty{color:var(--text-muted);font-style:italic;}
.dcr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.dca{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
     font-family:var(--fs);font-size:16px;padding:12px 13px;border-radius:9px;
     outline:none;resize:none;min-height:90px;line-height:1.5;display:none;
     margin-top:8px;transition:border-color .15s;-webkit-appearance:none;}
.dca:focus{border-color:var(--accent);}
.dacts{display:none;gap:8px;margin-top:10px;}
.deb{font-size:14px;padding:8px 14px;background:var(--surface2);
     border:1px solid var(--border);color:var(--text-dim);border-radius:7px;
     cursor:pointer;font-family:var(--fs);font-weight:600;
     -webkit-tap-highlight-color:transparent;white-space:nowrap;flex-shrink:0;}
.deb:active{background:var(--border);}

/* SHARED BTNS */
.btn{font-family:var(--fs);font-size:15px;font-weight:600;padding:12px 16px;
     border-radius:8px;cursor:pointer;border:none;transition:all .15s;
     -webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(.97);}
.bsv{background:var(--accent);color:#000;flex:1;}
.bsv:disabled{opacity:.5;pointer-events:none;}
.bcn{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);}
.btn-edit{font-size:12px;padding:6px 11px;background:var(--surface);
          border:1px solid var(--border);color:var(--text-dim);border-radius:5px;
          cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:var(--fs);
          font-weight:600;white-space:nowrap;flex-shrink:0;}
.btn-edit:active{background:var(--border);}

/* DESKTOP COMMENT+STATUS */
.cs{border-top:1px solid var(--border);padding:13px 14px;background:var(--surface2);}
.cr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.ctxt{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:7px;min-height:18px;}
.ctxt.empty{color:var(--text-muted);font-style:italic;}
.ca{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
    font-family:var(--fs);font-size:13px;padding:10px 12px;border-radius:7px;
    outline:none;resize:none;min-height:68px;line-height:1.5;display:none;}
.ca:focus{border-color:var(--accent);}
.cacts{display:flex;gap:7px;margin-top:8px;display:none;}
.sw2{margin-top:11px;padding-top:11px;border-top:1px solid var(--border);}
.stb{width:100%;padding:10px 14px;border-radius:7px;font-family:var(--fs);
     font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);
     background:var(--surface2);color:var(--text-dim);transition:all .2s;
     -webkit-tap-highlight-color:transparent;display:flex;align-items:center;
     justify-content:center;gap:6px;}
.stb:active{transform:scale(.98);}
.stb.ip{background:rgba(74,158,255,.14);border-color:rgba(74,158,255,.45);color:var(--blue);}
.stb.cp{background:rgba(46,207,122,.14);border-color:rgba(46,207,122,.45);color:var(--green);}
.stb.saving{opacity:.6;pointer-events:none;}

/* DESKTOP TABLE */
.tw{display:block;overflow-x:auto;border-radius:10px;
    border:1px solid var(--border);box-shadow:0 1px 4px var(--shadow);}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:760px;}
thead tr{background:var(--tbl-hdr);border-bottom:2px solid var(--border);}
th{padding:0;text-align:left;border-right:1px solid var(--border);white-space:nowrap;}
th:last-child{border-right:none;}
.thb{display:flex;align-items:center;gap:5px;width:100%;padding:10px 11px;
     font-family:var(--fm);font-size:9px;font-weight:600;color:var(--text-dim);
     text-transform:uppercase;letter-spacing:.7px;cursor:pointer;
     background:none;border:none;-webkit-tap-highlight-color:transparent;white-space:nowrap;}
.thb:active{background:var(--surface2);}
.thb.asc{color:var(--accent);}.thb.desc{color:var(--blue);}
.tic{font-size:10px;opacity:.3;transition:opacity .15s,transform .2s;flex-shrink:0;}
.thb.asc .tic,.thb.desc .tic{opacity:1;}
.thb.desc .tic{transform:rotate(180deg);}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:nth-child(even){background:var(--tbl-alt);}
tbody tr:hover{background:var(--tbl-hover);}
tbody tr.hn td:first-child{border-left:3px solid var(--accent);}
tbody tr.ro{background:var(--tbl-hover);}
td{padding:9px 11px;color:var(--text);border-right:1px solid var(--border);vertical-align:top;}
td:last-child{border-right:none;}
td.mo{font-family:var(--fm);font-size:11px;}
td.ac{font-family:var(--fm);font-size:11px;font-weight:600;color:var(--accent);}
.tt2{display:inline-block;font-family:var(--fm);font-size:9px;padding:2px 6px;
     border-radius:3px;text-transform:uppercase;letter-spacing:.4px;}
.dtr{display:none;}.dtr.open{display:table-row;}
.dtc{padding:0!important;border-right:none!important;background:var(--bg)!important;}
.din{padding:12px 14px;border-top:1px solid var(--border);border-left:3px solid var(--accent);}
.drg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 16px;margin-bottom:12px;}

/* ADMIN MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:flex-end;}
.mov.open{display:flex;}
.mo{background:var(--surface);border:1px solid var(--border);border-radius:18px 18px 0 0;
    padding:20px 16px 32px;width:100%;animation:sUp .25s ease-out;}
@keyframes sUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.moh{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.mot{font-size:15px;font-weight:600;margin-bottom:16px;text-align:center;}
.mol{font-family:var(--fm);font-size:9px;color:var(--text-muted);text-transform:uppercase;
     letter-spacing:.8px;margin-bottom:5px;display:block;}
.moi{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
     font-family:var(--fm);font-size:12px;padding:10px 12px;border-radius:8px;
     outline:none;margin-bottom:14px;transition:border-color .15s;}
.moi:focus{border-color:var(--accent);}
.mos{width:100%;background:var(--accent);color:#000;font-family:var(--fs);
     font-size:14px;font-weight:600;padding:12px;border-radius:9px;border:none;
     cursor:pointer;margin-bottom:8px;}
.moc{width:100%;background:transparent;border:1px solid var(--border);color:var(--text-dim);
     font-family:var(--fs);font-size:13px;padding:11px;border-radius:9px;cursor:pointer;}

/* STATES / TOAST / SPINNER */
.sm{text-align:center;padding:48px 24px;color:var(--text-muted);}
.sm .ic{font-size:36px;margin-bottom:12px;}
.sm p{font-size:14px;line-height:1.7;}
.lst{text-align:center;padding:48px 16px;}
.lst p{color:var(--text-muted);font-size:13px;font-family:var(--fm);margin-top:10px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
       background:var(--green);color:#fff;font-family:var(--fm);font-size:13px;
       font-weight:600;padding:11px 22px;border-radius:8px;z-index:999;
       transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--accent2);}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:block;width:28px;height:28px;border:3px solid var(--border);
      border-top-color:var(--accent);border-radius:50%;
      animation:spin .6s linear infinite;margin:0 auto 10px;}
.ssm{display:inline-block;width:14px;height:14px;border:2px solid var(--border);
     border-top-color:var(--accent);border-radius:50%;
     animation:spin .6s linear infinite;vertical-align:middle;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="lw show" id="loginWrap">
  <div class="lc">
    <div class="l-logo">NLR</div>
    <div class="l-title">No Location Reported</div>
    <div class="l-sub">CarMax &middot; Location 4070</div>
    <div class="l-err" id="loginErr">Incorrect username or password</div>
    <div class="l-field">
      <label class="l-lbl">Username</label>
      <input class="l-inp" id="loginUser" type="text" autocomplete="username"
        autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="Enter username"
        onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <div class="l-field">
      <label class="l-lbl">Password</label>
      <input class="l-inp" id="loginPass" type="password" autocomplete="current-password"
        placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="l-btn" onclick="doLogin()">Sign In</button>
    <div class="l-theme" onclick="toggleTheme()">
      <span class="tt-ic">&#127769;</span>
      <div class="tt-tr"><div class="tt-kn"></div></div>
      <span class="tt-ic">&#9728;&#65039;</span>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appWrap" style="display:none;">

  <!-- Admin modal -->
  <div class="mov" id="adminModal">
    <div class="mo">
      <div class="moh"></div>
      <div class="mot">Admin Settings</div>
      <label class="mol">Apps Script Web App URL</label>
      <input class="moi" id="adminUrl" type="url" placeholder="https://script.google.com/macros/s/..." />
      <button class="mos" onclick="saveAdminUrl()">Save &amp; Refresh</button>
      <button class="moc" onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <!-- Full-screen detail (mobile) -->
  <div class="ds" id="detailScreen">
    <div class="dsh">
      <button class="dsbk" onclick="closeDetail()">&#8592; Back</button>
      <div class="dshi">
        <div class="dshs" id="dHdrStk"></div>
        <div class="dshv" id="dHdrVeh"></div>
      </div>
    </div>
    <div class="dbody" id="dBody"></div>
  </div>

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-top">
      <!-- Row 1: Brand + username -->
      <div class="hdr-row1">
        <div class="brand">
          <div class="b-ico">NLR</div>
          <div class="b-txt">
            <div class="b-ttl">No Location Reported</div>
            <div class="b-sub">CarMax &middot; Location 4070</div>
          </div>
        </div>
        <span class="u-lbl" id="userLbl" style="display:none;"></span>
      </div>
      <!-- Row 2: 2x2 button grid -->
      <div class="hdr-row2">
        <div class="btn-grid">
          <div class="tt" onclick="toggleTheme()" title="Toggle theme">
            <span class="tt-ic">&#127769;</span>
            <div class="tt-tr"><div class="tt-kn"></div></div>
            <span class="tt-ic">&#9728;&#65039;</span>
          </div>
          <button class="bi" id="viewBtn" onclick="toggleView()" title="Switch view">&#9776;</button>
          <button class="bi loading" id="refreshBtn" onclick="loadData()" title="Refresh">&#8635;</button>
          <button class="bi" onclick="doLogout()" title="Sign out" style="font-size:17px;">&#9167;</button>
        </div>
        <button class="bi" id="adminBtn" onclick="openModal()" title="Admin" style="display:none;margin-left:6px;">&#9881;</button>
      </div>
    </div>
    <div class="rmt" id="rptMeta" style="display:none;">
      <span class="bdg bd" id="rptDate"></span>
      <span class="bdg bc" id="rptCnt"></span>
      <span class="bdg bl">Loc 4070</span>
      <span class="bdg bv" id="rptView">Card View</span>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="tb">
    <div class="sw">
      <span class="sico">&#8853;</span>
      <input class="si" id="srchInp" type="text"
        placeholder="Search stock #, VIN, vehicle..." oninput="applyFilters()" />
    </div>
    <div class="sbar" id="sortBar">
      <span style="font-family:var(--fm);font-size:9px;color:var(--text-muted);align-self:center;text-transform:uppercase;letter-spacing:.5px;">Sort:</span>
      <div class="spill" id="pill-Stock Num"           onclick="sortBy('Stock Num')">Stock # <span class="sarr">&#8597;</span></div>
      <div class="spill" id="pill-Year"                onclick="sortBy('Year')">Year <span class="sarr">&#8597;</span></div>
      <div class="spill" id="pill-Vehicle Description"  onclick="sortBy('Vehicle Description')">Vehicle <span class="sarr">&#8597;</span></div>
      <div class="spill" id="pill-Zone Description"    onclick="sortBy('Zone Description')">Zone <span class="sarr">&#8597;</span></div>
      <div class="spill" id="pill-Days in Color Zone"  onclick="sortBy('Days in Color Zone')">Days <span class="sarr">&#8597;</span></div>
      <div class="spill" id="pill-Product Status"      onclick="sortBy('Product Status')">Status <span class="sarr">&#8597;</span></div>
      <div class="spill" id="pill-Task Status"         onclick="sortBy('Task Status')">Task <span class="sarr">&#8597;</span></div>
    </div>
  </div>

  <!-- Content -->
  <div class="main" id="main">
    <div class="lst"><div class="spin"></div><p>Loading...</p></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// CONFIG
var SCRIPT_URL="https://script.google.com/macros/s/AKfycbz5OFLb3zGsAyBNnsvgORmY0OwESWMJPXMrjaiFIrk6xb2waMHv4iyZV7CoXbcDVGv3/exec";
var USERS={"admin":{pw:"1234",role:"admin"},"user1":{pw:"user1",role:"user"}};

var SESSION_KEY="nlr_u",THEME_KEY="nlr_t";
var currentUser=null,allData=[],expandedSn=null,currentView="card",sortCol=null,sortDir="asc",detailSn=null;

function isMobile(){return window.matchMedia("(max-width:639px)").matches;}
function au(){return window._scriptUrl||SCRIPT_URL;}

// BOOT
window.addEventListener("DOMContentLoaded",function(){
  var t=localStorage.getItem(THEME_KEY);if(t)applyTheme(t);
  var ov=localStorage.getItem("nlr_url_override");if(ov)window._scriptUrl=ov;
  var s=localStorage.getItem(SESSION_KEY);
  if(s&&USERS[s]){currentUser=s;startApp();}
});

// THEME
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);localStorage.setItem(THEME_KEY,t);}
function toggleTheme(){applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");}

// LOGIN
function doLogin(){
  var u=(document.getElementById("loginUser").value||"").trim().toLowerCase();
  var p=document.getElementById("loginPass").value||"";
  var e=document.getElementById("loginErr");
  if(USERS[u]&&USERS[u].pw===p){
    currentUser=u;localStorage.setItem(SESSION_KEY,u);
    e.classList.remove("show");
    document.getElementById("loginPass").value="";
    document.getElementById("loginWrap").classList.remove("show");
    startApp();
  }else{
    e.classList.add("show");
    document.getElementById("loginPass").value="";
    document.getElementById("loginPass").focus();
  }
}
function startApp(){
  currentView=isMobile()?"table":"card";
  document.getElementById("appWrap").style.display="block";
  var isA=USERS[currentUser].role==="admin";
  var ab=document.getElementById("adminBtn");if(ab)ab.style.display=isA?"flex":"none";
  var ul=document.getElementById("userLbl");if(ul){ul.textContent=currentUser;ul.style.display="inline-block";}
  updateViewUI();loadData();
}
function doLogout(){
  localStorage.removeItem(SESSION_KEY);
  currentUser=null;allData=[];expandedSn=null;detailSn=null;
  closeDetail();
  document.getElementById("appWrap").style.display="none";
  document.getElementById("loginWrap").classList.add("show");
  document.getElementById("loginUser").value="";
  document.getElementById("loginPass").value="";
  document.getElementById("loginErr").classList.remove("show");
  document.getElementById("rptMeta").style.display="none";
}

// VIEW
function toggleView(){currentView=currentView==="card"?"table":"card";updateViewUI();applyFilters();}
function updateViewUI(){
  var btn=document.getElementById("viewBtn"),lbl=document.getElementById("rptView"),sb=document.getElementById("sortBar");
  if(currentView==="card"){
    btn.innerHTML="&#9776;";btn.title="Switch to List View";btn.classList.remove("active");
    if(lbl)lbl.textContent="Card View";sb.classList.remove("show");
  }else{
    btn.innerHTML="&#8862;";btn.title="Switch to Card View";btn.classList.add("active");
    if(lbl)lbl.textContent="List View";sb.classList.add("show");
  }
}

// DATA
async function loadData(){
  var rb=document.getElementById("refreshBtn");rb.classList.add("loading");
  document.getElementById("main").innerHTML='<div class="lst"><div class="spin"></div><p>Loading vehicles...</p></div>';
  document.getElementById("rptMeta").style.display="none";
  try{
    var res=await fetch(au()+"?action=read");
    var json=await res.json();
    if(json.status!=="ok")throw new Error(json.message||"Error");
    allData=json.data;applyFilters();updateMeta(allData);
  }catch(e){
    document.getElementById("main").innerHTML='<div class="sm"><div class="ic">&#9888;&#65039;</div><p>Could not load data.<br><small>'+e.message+'</small></p></div>';
  }
  rb.classList.remove("loading");
}

// FILTER + SORT
function applyFilters(){
  var q=(document.getElementById("srchInp").value||"").toLowerCase();
  var data=q?allData.filter(function(r){
    return["Stock Num","Vehicle Description","VIN","Zone Description","Product Status","Last Scan Location","Task Status"].some(function(k){return String(r[k]||"").toLowerCase().indexOf(q)!==-1;});
  }):allData.slice();
  if(sortCol){
    data.sort(function(a,b){
      var va=String(a[sortCol]||"").toLowerCase(),vb=String(b[sortCol]||"").toLowerCase();
      var na=parseFloat(va),nb=parseFloat(vb);
      if(!isNaN(na)&&!isNaN(nb)){va=na;vb=nb;}
      if(va<vb)return sortDir==="asc"?-1:1;
      if(va>vb)return sortDir==="asc"?1:-1;
      return 0;
    });
  }
  if(currentView==="card")renderCards(data);
  else if(isMobile())renderMobList(data);
  else renderTable(data);
}
function sortBy(col){
  if(sortCol===col)sortDir=sortDir==="asc"?"desc":"asc";
  else{sortCol=col;sortDir="asc";}
  updatePills();applyFilters();
}
function updatePills(){
  document.querySelectorAll(".spill").forEach(function(p){
    p.classList.remove("asc","desc");var a=p.querySelector(".sarr");if(a)a.innerHTML="&#8597;";
  });
  if(!sortCol)return;
  var pill=document.getElementById("pill-"+sortCol);
  if(pill){pill.classList.add(sortDir);var a=pill.querySelector(".sarr");if(a)a.innerHTML=sortDir==="asc"?"&#8593;":"&#8595;";}
}

// CARD VIEW
function renderCards(data){
  var m=document.getElementById("main");
  if(!data.length){m.innerHTML=emptyMsg();return;}
  m.innerHTML='<div class="cg">'+data.map(buildCard).join("")+'</div>';
  if(expandedSn){var el=document.getElementById("card-"+expandedSn);if(el)el.classList.add("open");}
}
function buildCard(r){
  var sn=r["Stock Num"]||"",yr=r["Year"]||"",desc=r["Vehicle Description"]||"";
  var sd=r["Last Scan Date"]||"",sl=r["Last Scan Location"]||"";
  var zn=r["Zone Description"]||"",dc=r["Days in Color Zone"]||"0";
  var vin=r["VIN"]||"",ps=r["Product Status"]||"",ds=r["Days In Status"]||"";
  var cmt=r["Comments"]||"",ts=r["Task Status"]||"";
  var isO=expandedSn===sn,hc=cmt.trim()!=="",dn=parseInt(dc)||0;
  var dc2=dn>=3?"td":"tok",tc=ts==="Completed"?"tcp":ts==="In Progress"?"tip":"tn",tl=ts||"No Status";
  return '<div class="card'+(hc?" hn":"")+(isO?" open":"")+'\" id=\"card-'+sn+'">' +
    '<div class="ch" onclick="toggleCard(\''+sn+'\')">' +
    '<div class="sp">#'+sn+'</div>' +
    '<div class="cb"><div class="vn"><span class="vy">'+yr+'</span>'+desc+'</div>' +
    '<div class="ct"><span class="tag tz">'+(zn||sl)+'</span><span class="tag ts">'+ps+'</span><span class="tag '+dc2+'">'+dc+' day'+(dn!==1?'s':'')+'</span><span class="tag '+tc+'">'+tl+'</span></div></div>' +
    '<span class="cc">&#9660;</span></div>' +
    '<div class="cd"><div class="dg">' +
    '<div class="di"><div class="dl">Scan Date</div><div class="dv">'+sd+'</div></div>' +
    '<div class="di"><div class="dl">Location</div><div class="dv">'+sl+'</div></div>' +
    '<div class="di"><div class="dl">Days In Status</div><div class="dv">'+ds+'</div></div>' +
    '<div class="di"><div class="dl">Color Zone Days</div><div class="dv">'+dc+'</div></div>' +
    '<div class="di full"><div class="dl">VIN</div><div class="dv">'+vin+'</div></div>' +
    '</div></div>'+buildCmtSec(sn,cmt,hc,ts)+'</div>';
}
function toggleCard(sn){
  if(expandedSn&&expandedSn!==sn){var p=document.getElementById("card-"+expandedSn);if(p)p.classList.remove("open");}
  expandedSn=expandedSn===sn?null:sn;
  var el=document.getElementById("card-"+sn);if(el)el.classList.toggle("open",expandedSn===sn);
}

// MOBILE LIST
function renderMobList(data){
  var m=document.getElementById("main");
  if(!data.length){m.innerHTML=emptyMsg();return;}
  m.innerHTML='<div class="ml">'+data.map(buildMobRow).join("")+'</div>';
}
function buildMobRow(r){
  var sn=r["Stock Num"]||"",yr=r["Year"]||"",desc=r["Vehicle Description"]||"";
  var zn=r["Zone Description"]||"",sl=r["Last Scan Location"]||"";
  var dc=r["Days in Color Zone"]||"0",ps=r["Product Status"]||"";
  var cmt=r["Comments"]||"",ts=r["Task Status"]||"";
  var hc=cmt.trim()!=="",dn=parseInt(dc)||0;
  var dayTag=dn>=3?"td":"tok";
  var tbC=ts==="Completed"?"cp":"ip",tbL=ts==="Completed"?"Completed":"In Progress";
  return '<div class="mr'+(hc?" hn":"")+'\" onclick=\"openDetail(\''+sn+'\')">' +
    '<div class="mrl">' +
    '<div class="mrs">#'+sn+'</div>' +
    '<div class="mrv"><span class="mry">'+yr+'</span>'+desc+'</div>' +
    '<div class="mrm"><span class="tag tz">'+(zn||sl||"—")+'</span><span class="tag ts">'+ps+'</span><span class="tag '+dayTag+'">'+dc+' day'+(dn!==1?'s':'')+'</span></div>' +
    '</div>' +
    '<div class="mrr"><span class="mtb '+tbC+'">'+tbL+'</span><span class="mch">&#8250;</span></div>' +
    '</div>';
}

// FULL-SCREEN DETAIL
function openDetail(sn){
  var r=allData.find(function(x){return String(x["Stock Num"])===String(sn);});
  if(!r)return;
  detailSn=sn;
  var yr=r["Year"]||"",desc=r["Vehicle Description"]||"";
  var sd=r["Last Scan Date"]||"—",sl=r["Last Scan Location"]||"—";
  var zn=r["Zone Description"]||"—",dc=r["Days in Color Zone"]||"0";
  var vin=r["VIN"]||"—",ps=r["Product Status"]||"—",ds=r["Days In Status"]||"—";
  var cmt=r["Comments"]||"",ts=r["Task Status"]||"";
  var hc=cmt.trim()!=="",isCP=ts==="Completed";
  document.getElementById("dHdrStk").textContent="#"+sn;
  document.getElementById("dHdrVeh").textContent=yr+" "+desc;
  var body=
    '<div class="dsec"><div class="dsec-t">Vehicle Details</div><div class="dff">' +
    '<div class="df"><div class="dfl">Stock #</div><div class="dfv">'+sn+'</div></div>' +
    '<div class="df"><div class="dfl">Year</div><div class="dfv">'+yr+'</div></div>' +
    '<div class="df full"><div class="dfl">Vehicle</div><div class="dfv">'+desc+'</div></div>' +
    '<div class="df full"><div class="dfl">VIN</div><div class="dfv">'+vin+'</div></div>' +
    '</div></div>' +
    '<div class="dsec"><div class="dsec-t">Location &amp; Status</div><div class="dff">' +
    '<div class="df"><div class="dfl">Last Scan Date</div><div class="dfv">'+sd+'</div></div>' +
    '<div class="df"><div class="dfl">Scan Location</div><div class="dfv">'+sl+'</div></div>' +
    '<div class="df"><div class="dfl">Zone</div><div class="dfv">'+zn+'</div></div>' +
    '<div class="df"><div class="dfl">Days in Zone</div><div class="dfv">'+dc+'</div></div>' +
    '<div class="df"><div class="dfl">Days In Status</div><div class="dfv">'+ds+'</div></div>' +
    '<div class="df"><div class="dfl">Product Status</div><div class="dfv">'+ps+'</div></div>' +
    '</div></div>' +
    '<div class="dsec"><div class="dsec-t">Task Status</div>' +
    '<button class="dsb '+(isCP?"cp":"ip")+'" id="dstb-'+sn+'" onclick="detSetTs(\''+sn+'\')">'+
    (isCP?"&#10003; Completed":"&#9203; In Progress")+'</button></div>' +
    '<div class="dsec"><div class="dsec-t">Comments</div>' +
    '<div class="dcr"><div class="dct'+(hc?"":" empty")+'" id="dctxt-'+sn+'">'+
    (hc?cmt:"No comment yet")+'</div>' +
    '<button class="deb" onclick="detStartEdit(\''+sn+'\')">'+( hc?"Edit":"+ Add")+'</button></div>' +
    '<textarea class="dca" id="dcinp-'+sn+'" placeholder="Add notes...">'+cmt+'</textarea>' +
    '<div class="dacts" id="dcact-'+sn+'">' +
    '<button class="btn bcn" onclick="detCancelEdit(\''+sn+'\')">Cancel</button>' +
    '<button class="btn bsv" id="dcsav-'+sn+'" onclick="detSaveComment(\''+sn+'\')">Save</button>' +
    '</div></div>' +
    '<div style="height:32px;"></div>';
  document.getElementById("dBody").innerHTML=body;
  document.getElementById("dBody").scrollTop=0;
  document.getElementById("detailScreen").classList.add("show");
}
function closeDetail(){
  detailSn=null;
  document.getElementById("detailScreen").classList.remove("show");
  applyFilters();
}

// DETAIL — TASK STATUS
async function detSetTs(sn){
  var r=allData.find(function(x){return String(x["Stock Num"])===String(sn);});if(!r)return;
  var cur=r["Task Status"]||"In Progress",nxt=cur==="Completed"?"In Progress":"Completed";
  var btn=document.getElementById("dstb-"+sn);
  if(btn){btn.classList.remove("ip","cp");btn.classList.add("saving");btn.classList.add(nxt==="Completed"?"cp":"ip");btn.innerHTML=nxt==="Completed"?"&#10003; Completed":"&#9203; In Progress";}
  try{
    await fetch(au()+"?action=updateTaskStatus&stockNum="+encodeURIComponent(sn)+"&taskStatus="+encodeURIComponent(nxt),{mode:"no-cors"});
    r["Task Status"]=nxt;toast(nxt==="Completed"?"Marked Completed":"Marked In Progress");
    if(btn)btn.classList.remove("saving");
  }catch(e){toast("Save failed: "+e.message,true);if(btn)btn.classList.remove("saving");}
}

// DETAIL — COMMENT
function detStartEdit(sn){
  var ta=document.getElementById("dcinp-"+sn),ac=document.getElementById("dcact-"+sn);
  if(ta){ta.style.display="block";ac.style.display="flex";ta.focus();}
}
function detCancelEdit(sn){
  var ta=document.getElementById("dcinp-"+sn),ac=document.getElementById("dcact-"+sn);
  var r=allData.find(function(x){return String(x["Stock Num"])===String(sn);});
  if(ta&&r)ta.value=r["Comments"]||"";if(ta)ta.style.display="none";if(ac)ac.style.display="none";
}
async function detSaveComment(sn){
  var ta=document.getElementById("dcinp-"+sn),btn=document.getElementById("dcsav-"+sn);
  var cmt=ta?ta.value.trim():"";
  btn.disabled=true;btn.innerHTML='<span class="ssm"></span>';
  try{
    await fetch(au()+"?action=updateComment&stockNum="+encodeURIComponent(sn)+"&comment="+encodeURIComponent(cmt),{mode:"no-cors"});
    var r=allData.find(function(x){return String(x["Stock Num"])===String(sn);});if(r)r["Comments"]=cmt;
    var ct=document.getElementById("dctxt-"+sn);
    if(ct){ct.textContent=cmt||"No comment yet";ct.className="dct"+(cmt?"":" empty");}
    if(ta)ta.style.display="none";var ac=document.getElementById("dcact-"+sn);if(ac)ac.style.display="none";
    btn.disabled=false;btn.innerHTML="Save";
    toast(cmt?"Comment saved":"Comment cleared");
  }catch(e){toast("Save failed: "+e.message,true);btn.disabled=false;btn.innerHTML="Save";}
}

// DESKTOP TABLE
var TCOLS=[
  {k:"Stock Num",l:"Stock #",c:"ac"},{k:"Year",l:"Year",c:"mo"},
  {k:"Vehicle Description",l:"Vehicle",c:""},{k:"Last Scan Date",l:"Scan Date",c:"mo"},
  {k:"Zone Description",l:"Zone",c:""},{k:"Days in Color Zone",l:"Days",c:"mo"},
  {k:"Product Status",l:"Prod Status",c:""},{k:"Task Status",l:"Task",c:""},{k:"Comments",l:"Notes",c:""}
];
function renderTable(data){
  var m=document.getElementById("main");
  if(!data.length){m.innerHTML=emptyMsg();return;}
  var h='<div class="tw"><table><thead><tr>';
  TCOLS.forEach(function(col){
    var act=sortCol===col.k,bc=act?(sortDir==="asc"?"asc":"desc"):"",arr=act?(sortDir==="asc"?"&#8593;":"&#8595;"):"&#8597;";
    h+='<th><button class="thb '+bc+'" onclick="sortBy(\''+col.k+'\')">'+col.l+' <span class="tic">'+arr+'</span></button></th>';
  });
  h+='</tr></thead><tbody>';
  data.forEach(function(r){
    var sn=r["Stock Num"]||"",hc=(r["Comments"]||"").trim()!=="",isO=expandedSn===sn;
    var dn=parseInt(r["Days in Color Zone"])||0,ts=r["Task Status"]||"";
    h+='<tr class="'+(hc?"hn ":"")+(isO?"ro":"")+'" onclick="toggleTrow(\''+sn+'\')">';
    TCOLS.forEach(function(col){
      var v=r[col.k]||"",cell="";
      if(col.k==="Days in Color Zone"){cell='<span class="tt2 '+(dn>=3?"td":"tok")+'">'+v+'</span>';}
      else if(col.k==="Product Status"){cell='<span class="tt2 ts">'+v+'</span>';}
      else if(col.k==="Task Status"){var tc=v==="Completed"?"tcp":v==="In Progress"?"tip":"tn";cell='<span class="tt2 '+tc+'">'+(v||"—")+'</span>';}
      else if(col.k==="Comments"){cell=v?'<span style="font-size:11px;color:var(--accent);">&#9998;</span> '+trunc(v,22):'<span style="color:var(--text-muted);font-style:italic;font-size:11px;">—</span>';}
      else{cell=v;}
      h+='<td class="'+col.c+'">'+cell+'</td>';
    });
    h+='</tr><tr class="dtr'+(isO?" open":"")+'\" id=\"trow-'+sn+'">' +
       '<td class="dtc" colspan="'+TCOLS.length+'"><div class="din">' +
       '<div class="drg">' +
       '<div><div class="dl">VIN</div><div class="dv">'+(r["VIN"]||"—")+'</div></div>' +
       '<div><div class="dl">Scan Location</div><div class="dv">'+(r["Last Scan Location"]||"—")+'</div></div>' +
       '<div><div class="dl">Days In Status</div><div class="dv">'+(r["Days In Status"]||"—")+'</div></div>' +
       '</div>'+buildCmtSec(sn,r["Comments"]||"",hc,ts)+
       '</div></td></tr>';
  });
  h+='</tbody></table></div>';
  m.innerHTML=h;
  if(expandedSn){var dt=document.getElementById("trow-"+expandedSn);if(dt){dt.classList.add("open");var tr=dt.previousElementSibling;if(tr)tr.classList.add("ro");}}
}
function toggleTrow(sn){
  if(expandedSn&&expandedSn!==sn){var pd=document.getElementById("trow-"+expandedSn);if(pd){pd.classList.remove("open");var pt=pd.previousElementSibling;if(pt)pt.classList.remove("ro");}}
  expandedSn=expandedSn===sn?null:sn;
  var dt=document.getElementById("trow-"+sn);
  if(dt){dt.classList.toggle("open",expandedSn===sn);var tr=dt.previousElementSibling;if(tr)tr.classList.toggle("ro",expandedSn===sn);}
}

// COMMENT + STATUS (card/desktop)
function buildCmtSec(sn,cmt,hc,ts){
  var eff=ts||"In Progress",isCP=eff==="Completed";
  var bC=isCP?" cp":" ip",bL=isCP?"&#10003; Completed":"&#9203; In Progress";
  return '<div class="cs"><div class="dl" style="margin-bottom:7px;">Task Status</div>' +
    '<div class="sw2"><button class="stb'+bC+'" id="stb-'+sn+'" onclick="setTs(\''+sn+'\')">'+bL+'</button></div>' +
    '<div class="dl" style="margin-top:13px;margin-bottom:7px;">Comments</div>' +
    '<div class="cr"><div class="ctxt'+(hc?"":" empty")+'" id="ctxt-'+sn+'">'+( hc?cmt:"No comment yet")+'</div>' +
    '<button class="btn-edit" onclick="startEdit(\''+sn+'\')">'+( hc?"Edit":"+ Add")+'</button></div>' +
    '<textarea class="ca" id="cinp-'+sn+'" placeholder="Add notes...">'+cmt+'</textarea>' +
    '<div class="cacts" id="cact-'+sn+'">' +
    '<button class="btn bcn" onclick="cancelEdit(\''+sn+'\')">Cancel</button>' +
    '<button class="btn bsv" id="csav-'+sn+'" onclick="saveComment(\''+sn+'\')">Save</button>' +
    '</div></div>';
}
async function setTs(sn){
  event.stopPropagation();
  var r=allData.find(function(x){return String(x["Stock Num"])===String(sn);});if(!r)return;
  var cur=r["Task Status"]||"In Progress",nxt=cur==="Completed"?"In Progress":"Completed";
  var btn=document.getElementById("stb-"+sn);
  if(btn){btn.classList.remove("ip","cp");btn.classList.add("saving");btn.classList.add(nxt==="Completed"?"cp":"ip");btn.innerHTML=nxt==="Completed"?"&#10003; Completed":"&#9203; In Progress";}
  try{
    await fetch(au()+"?action=updateTaskStatus&stockNum="+encodeURIComponent(sn)+"&taskStatus="+encodeURIComponent(nxt),{mode:"no-cors"});
    r["Task Status"]=nxt;toast(nxt==="Completed"?"Marked Completed":"Marked In Progress");if(btn)btn.classList.remove("saving");
  }catch(e){toast("Save failed: "+e.message,true);if(btn)btn.classList.remove("saving");}
}
function startEdit(sn){
  event.stopPropagation();
  if(expandedSn&&expandedSn!==sn){var p=document.getElementById("card-"+expandedSn);if(p)p.classList.remove("open");}
  expandedSn=sn;var el=document.getElementById("card-"+sn);if(el)el.classList.add("open");
  setTimeout(function(){var ta=document.getElementById("cinp-"+sn),ac=document.getElementById("cact-"+sn);if(ta){ta.style.display="block";ac.style.display="flex";ta.focus();}},60);
}
function cancelEdit(sn){
  event.stopPropagation();
  var ta=document.getElementById("cinp-"+sn),ac=document.getElementById("cact-"+sn);
  var r=allData.find(function(x){return String(x["Stock Num"])===String(sn);});
  if(ta&&r)ta.value=r["Comments"]||"";if(ta)ta.style.display="none";if(ac)ac.style.display="none";
}
async function saveComment(sn){
  event.stopPropagation();
  var ta=document.getElementById("cinp-"+sn),btn=document.getElementById("csav-"+sn);
  var cmt=ta?ta.value.trim():"";
  btn.disabled=true;btn.innerHTML='<span class="ssm"></span>';
  try{
    await fetch(au()+"?action=updateComment&stockNum="+encodeURIComponent(sn)+"&comment="+encodeURIComponent(cmt),{mode:"no-cors"});
    var r=allData.find(function(x){return String(x["Stock Num"])===String(sn);});if(r)r["Comments"]=cmt;
    toast(cmt?"Comment saved":"Comment cleared");expandedSn=sn;applyFilters();
  }catch(e){toast("Save failed: "+e.message,true);btn.disabled=false;btn.innerHTML="Save";}
}

// META
function updateMeta(d){
  document.getElementById("rptMeta").style.display="flex";
  document.getElementById("rptDate").textContent=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit"});
  document.getElementById("rptCnt").textContent=d.length+" vehicle"+(d.length!==1?"s":"");
}

// ADMIN MODAL
function openModal(){document.getElementById("adminUrl").value=window._scriptUrl||SCRIPT_URL;document.getElementById("adminModal").classList.add("open");}
function closeModal(){document.getElementById("adminModal").classList.remove("open");}
function saveAdminUrl(){
  var url=document.getElementById("adminUrl").value.trim();
  if(!url||!url.startsWith("https://")){toast("Please enter a valid https:// URL",true);return;}
  window._scriptUrl=url;localStorage.setItem("nlr_url_override",url);
  closeModal();toast("URL updated — reloading data");loadData();
}
document.getElementById("adminModal").addEventListener("click",function(e){if(e.target===this)closeModal();});

// TOAST / HELPERS
function toast(msg,isErr){
  var el=document.getElementById("toast");
  el.textContent=msg;el.className="toast show"+(isErr?" err":"");
  clearTimeout(window._tt);window._tt=setTimeout(function(){el.className="toast";},2500);
}
function trunc(s,n){return s.length>n?s.substring(0,n)+"...":s;}
function emptyMsg(){return '<div class="sm"><div class="ic">&#10003;</div><p>No vehicles to display.</p></div>';}

var _rt;
window.addEventListener("resize",function(){clearTimeout(_rt);_rt=setTimeout(function(){applyFilters();},200);});
</script>
